name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check OK: $PKG_VERSION"

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Determine dist-tag
        id: disttag
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "Prerelease detected — publishing to 'beta' dist-tag"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "Stable release — publishing to 'latest' dist-tag"
          fi

      - name: Publish to npm
        run: npm publish --tag ${{ steps.disttag.outputs.tag }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
